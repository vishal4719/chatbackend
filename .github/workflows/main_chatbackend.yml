# Build a Docker image, push to Azure Container Registry, deploy to App Service.
#
# Azure portal setup (one-time):
# 1. App Service → Deployment Center → Container → Azure Container Registry
# 2. App Service → Configuration → General settings → Stack = Docker Container
# 3. Add GitHub secrets: REGISTRYURL, REGISTRYUSERNAME, REGISTRYPASSWORD
#    (Azure often creates these when you connect ACR in Deployment Center)

name: Build and deploy Docker container to Azure Web App - chatbackend

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: chatbackend
  IMAGE_NAME: chatbackend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_FF8CF3EBA9C240F49439B7BF81492519 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_1E599B8B7D104FD79FC15B833793ACF5 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_AEB04F074E644E378370F8852E8B77C7 }}

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.REGISTRYURL }}
          username: ${{ secrets.REGISTRYUSERNAME }}
          password: ${{ secrets.REGISTRYPASSWORD }}

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRYURL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ secrets.REGISTRYURL }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: Production
          images: ${{ secrets.REGISTRYURL }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
